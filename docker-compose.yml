# Docker Compose for Claude WS
# version: '3.9'

services:
  # Main Application (Agentic SDK)
  claude-ws:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-workspace
    restart: unless-stopped
    ports:
      - "8053:8053"
    env_file:
      - .env

    environment:
      # Server Configuration
      - NODE_ENV=production
      - PORT=${PORT:-8053}
      - CLAUDE_WS_MODE=lite
      - CLAUDE_WS_PROJECT_PATH=/workspace

      # Data Directory
      - DATA_DIR=/app/data

      # Skip loading .env file (using environment variables from docker-compose)
      - CLAUDE_WS_USER_CWD=/app

      # Logging (Optional)
      # - LOG_LEVEL=info

      # Claude Code CLI Path (Optional)
      # - CLAUDE_PATH=/usr/local/bin/claude

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - claude-data:/app/data
      - ./workspace:/workspace

    networks:
      - claude-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8053/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  claude-data:
    driver: local

networks:
  claude-network:
    driver: bridge
